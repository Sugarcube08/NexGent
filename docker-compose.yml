services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: shoujiki
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shoujiki
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  sandbox:
    build:
      context: ./apps/sandbox
    ports:
      - "8001:8001"
    environment:
      - PORT=8001

  api:
    build:
      context: ./apps/api
    ports:
      - "8000:8000"
    depends_on:
      - db
      - sandbox
    environment:
      - DATABASE_URL=postgresql+asyncpg://shoujiki:password@db/shoujiki
      - SOLANA_RPC_URL=https://api.devnet.solana.com
      - SANDBOX_URL=http://sandbox:8001
      - PLATFORM_SECRET_SEED=shoujiki_escrow_platform_secret_32
      - SQUADS_PROGRAM_ID=SQDS4Byj9s7BfR7atvH9iSnduXW1U9CAdX9rW5L2S8X

  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_SOLANA_RPC_URL=https://api.devnet.solana.com
      - NEXT_PUBLIC_SQUADS_PROGRAM_ID=SQDS4Byj9s7BfR7atvH9iSnduXW1U9CAdX9rW5L2S8X

volumes:
  postgres_data:
